<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maintenance Dashboard Login</title>
<style>
  :root{ --bg:#0f1220; --card:#171b2e; --accent:#5b8def; --text:#e8eaf2; --muted:#9aa3c0; --red:#ff6b6b; }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text);
  }
  .box{
    background:var(--card); border:1px solid #262b45; border-radius:16px;
    padding:36px 32px; width:340px;
  }
  h1{ font-size:18px; margin:0 0 4px; }
  p.sub{ color:var(--muted); font-size:13px; margin:0 0 24px; }
  label{ font-size:12.5px; color:var(--muted); display:block; margin-bottom:6px; }
  input{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid #2b3057;
    background:#0f1220; color:var(--text); font-size:14px; margin-bottom:16px;
  }
  button{
    width:100%; padding:11px; border:none; border-radius:8px; background:var(--accent);
    color:#fff; font-weight:600; font-size:14px; cursor:pointer;
  }
  button:disabled{ opacity:0.6; cursor:not-allowed; }
  #error{ color:var(--red); font-size:12.5px; margin-top:12px; min-height:16px; }
</style>
</head>
<body>
  <div class="box">
    <h1>Maintenance Dashboard Login</h1>
    <p class="sub">Sign in to view your service summary</p>
    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="username">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password">
    <button id="loginBtn">Sign In</button>
    <div id="error"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { initializeFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false });

    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('error');

    // If already logged in, redirect straight to viewer/admin
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await routeUser(user);
      }
    });

    loginBtn.addEventListener('click', async () => {
      errorDiv.textContent = '';
      loginBtn.disabled = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await routeUser(cred.user);
      } catch (e) {
        errorDiv.textContent = 'Login failed. Check your email/password and try again.';
        loginBtn.disabled = false;
      }
    });

    async function routeUser(user) {
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) {
          errorDiv.textContent = 'No access configured for this account. Contact admin.';
          return;
        }
        const data = snap.data();
        if (data.role === 'admin') {
          window.location.href = './admin.html';
        } else if (data.disti) {
          window.location.href = './viewer.html';
        } else {
          errorDiv.textContent = 'Account not configured correctly. Contact admin.';
        }
      } catch (e) {
        errorDiv.textContent = 'Could not verify access. Try again.';
      }
    }
  </script>
</body>
</html>
