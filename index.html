<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Partner Service Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    --bg:#0f1220; --card:#171b2e; --accent:#5b8def; --text:#e8eaf2; --muted:#9aa3c0;
    --green:#3ecf8e; --red:#ff6b6b; --amber:#ffb84d;
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; }
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); overflow-y:auto;
  }
  header{
    padding:16px 28px; background:linear-gradient(135deg,#1c2140,#0f1220);
    border-bottom:1px solid #262b45; display:flex; align-items:center; justify-content:space-between;
  }
  header h1{ font-size:19px; margin:0; font-weight:600; }
  header p{ margin:3px 0 0; color:var(--muted); font-size:12.5px; }

  .upload-zone{
    margin:20px 28px; padding:24px; border:2px dashed #3a4070; border-radius:14px;
    text-align:center; background:var(--card); cursor:pointer; transition:.2s;
  }
  .upload-zone.dragover{ border-color:var(--accent); background:#1d2240; }
  .upload-zone input{ display:none; }
  .upload-zone .btn{
    display:inline-block; margin-top:10px; padding:8px 18px; background:var(--accent);
    color:#fff; border-radius:8px; font-size:14px; font-weight:600;
  }

  #dashboard{ display:none; padding:0 28px 28px; }

  .filters{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .filters select{
    background:var(--card); color:var(--text); border:1px solid #2b3057; border-radius:8px;
    padding:7px 12px; font-size:12.5px;
  }

  .kpis{ display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:16px; }
  .kpi{ background:var(--card); border-radius:12px; padding:12px 14px; border:1px solid #262b45; }
  .kpi .val{ font-size:21px; font-weight:700; }
  .kpi .lbl{ font-size:11px; color:var(--muted); margin-top:3px; }
  .kpi.green .val{ color:var(--green); }
  .kpi.red .val{ color:var(--red); }
  .kpi.amber .val{ color:var(--amber); }

  .grid{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:16px; }
  .card{ background:var(--card); border-radius:12px; padding:12px 14px; border:1px solid #262b45; }
  .card h3{ margin:0 0 8px; font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
  canvas{ max-height:230px; }

  .table-wrap{ overflow:auto; max-height:220px; border-radius:10px; }
  table{ width:100%; border-collapse:collapse; font-size:12px; }
  th,td{ padding:6px 9px; border-bottom:1px solid #262b45; text-align:left; white-space:nowrap; }
  th{ background:#1c2140; position:sticky; top:0; color:var(--muted); }
  tr:hover td{ background:#1b1f36; }

  .toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:10px; }
  .toolbar button{
    background:var(--accent); border:none; color:#fff; padding:7px 14px; border-radius:8px;
    font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .toolbar button.secondary{ background:#2b3057; }
  #fileName{ color:var(--muted); font-size:13px; }

  @media (max-width: 1200px){ .grid{ grid-template-columns:repeat(2,1fr); } .kpis{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width: 700px){ .grid{ grid-template-columns:1fr; } .kpis{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>

<header>
  <div>
    <h1>Partner Service Dashboard</h1>
    <p id="fileName">Upload your weekly ACS ticket export to generate visuals</p>
  </div>
</header>

<div class="upload-zone" id="dropZone">
  <div>📊 Drag & drop your <b>.xlsx</b> file here, or click to browse</div>
  <label class="btn" for="fileInput">Choose File</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<div id="dashboard">
  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <div>
      <button class="secondary" onclick="resetApp()">Upload New File</button>
      <button onclick="exportSummaryCsv()">Export Summary CSV</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="card"><h3>DISTI-wise Ticket Distribution</h3><canvas id="chartDisti"></canvas></div>
    <div class="card"><h3>SLA Adherence</h3><canvas id="chartSla"></canvas></div>
    <div class="card"><h3>Current Status-wise Tickets</h3><canvas id="chartCurrentStatus"></canvas></div>
    <div class="card"><h3>RTM-wise Tickets</h3><canvas id="chartRtm"></canvas></div>
    <div class="card"><h3>Trade / Problem Area</h3><canvas id="chartTrade"></canvas></div>
    <div class="card">
      <h3>DISTI × SLA Adherence Summary</h3>
      <div class="table-wrap"><table id="summaryTable"></table></div>
    </div>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);

let rawRows = [];
let charts = {};
let filterState = { disti: '', currentStatus: '' };

const DISTI_MAP = {
  'croma': 'CROMA',
  'reliance digital': 'Reliance Digital',
  'vijay sales': 'Vijay Sales',
  'ingram': 'INGRAM',
  'redington': 'REDINGTON'
};

function normalizeDisti(v){
  if(!v) return 'Unknown';
  const key = String(v).trim().toLowerCase();
  return DISTI_MAP[key] || v.trim();
}

function excelDateToJS(serial){
  if(serial === null || serial === undefined || serial === '' ) return null;
  if(typeof serial === 'string'){
    const d = new Date(serial.replace(/\//g,'-'));
    return isNaN(d) ? null : d;
  }
  if(typeof serial === 'number'){
    const utc_days = Math.floor(serial - 25569);
    const utc_value = utc_days * 86400;
    return new Date(utc_value * 1000);
  }
  return null;
}

function computeSla(row){
  const eta = excelDateToJS(row['ETA Date/SLA']);
  const completed = excelDateToJS(row['Service Completed Date']);
  if(!eta) return 'N/A';
  if(!completed) return 'Pending';
  const e = new Date(eta.getFullYear(), eta.getMonth(), eta.getDate());
  const c = new Date(completed.getFullYear(), completed.getMonth(), completed.getDate());
  return c <= e ? 'Within SLA' : 'Out of SLA';
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if(e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file){
  document.getElementById('fileName').textContent = 'Loaded: ' + file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array', cellDates:false });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    rawRows = rows.map(r => {
      r['DISTI_norm'] = normalizeDisti(r['DISTI']);
      r['SLA_calc'] = computeSla(r);
      return r;
    });
    filterState = { disti: '', currentStatus: '' };
    applyFiltersAndRender();
  };
  reader.readAsArrayBuffer(file);
}

function resetApp(){
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('fileName').textContent = 'Upload your weekly ACS ticket export to generate visuals';
  fileInput.value = '';
}

function countBy(rows, key){
  const map = {};
  rows.forEach(r => {
    const v = (r[key] === '' || r[key] === undefined) ? 'Unknown' : r[key];
    map[v] = (map[v] || 0) + 1;
  });
  return map;
}

function makeChart(id, type, labels, data, colors, opts){
  opts = opts || {};
  const ctx = document.getElementById(id);
  if(charts[id]) charts[id].destroy();
  const isPieLike = type === 'pie' || type === 'doughnut';
  charts[id] = new Chart(ctx, {
    type,
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: isPieLike ? 2 : 0, borderColor:'#171b2e' }] },
    options: {
      plugins: {
        legend: { position: type==='bar' ? 'none' : 'right', labels:{color:'#e8eaf2', font:{size:10.5}} },
        datalabels: isPieLike && opts.showCounts ? {
          color:'#fff', font:{weight:'700', size:11},
          formatter: (value) => value
        } : { display:false }
      },
      scales: type==='bar' ? {
        x:{ ticks:{color:'#9aa3c0', font:{size:10}}, grid:{color:'#262b45'} },
        y:{ ticks:{color:'#9aa3c0'}, grid:{color:'#262b45'} }
      } : {}
    }
  });
}

const PALETTE = ['#5b8def','#3ecf8e','#ff6b6b','#ffb84d','#c792ea','#4ec9f0','#f0a500','#8bc34a','#e91e63','#607d8b'];

function applyFiltersAndRender(){
  let filtered = rawRows;
  if(filterState.disti) filtered = filtered.filter(r => r['DISTI_norm'] === filterState.disti);
  if(filterState.currentStatus) filtered = filtered.filter(r => r['Current Status'] === filterState.currentStatus);
  buildDashboard(filtered);
}

function buildDashboard(rows){
  document.getElementById('dashboard').style.display = 'block';

  const total = rows.length;
  const closed = rows.filter(r => r['Status'] === 'Closed').length;
  const within = rows.filter(r => r['SLA_calc'] === 'Within SLA').length;
  const outOfSla = rows.filter(r => r['SLA_calc'] === 'Out of SLA').length;
  const pending = rows.filter(r => r['SLA_calc'] === 'Pending').length;
  const slaBase = within + outOfSla;
  const slaPct = slaBase ? Math.round((within/slaBase)*100) : 0;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="val">${total}</div><div class="lbl">Total Tickets</div></div>
    <div class="kpi green"><div class="val">${closed}</div><div class="lbl">Closed Tickets</div></div>
    <div class="kpi green"><div class="val">${within}</div><div class="lbl">Within SLA</div></div>
    <div class="kpi red"><div class="val">${outOfSla}</div><div class="lbl">Out of SLA</div></div>
    <div class="kpi amber"><div class="val">${pending}</div><div class="lbl">Pending</div></div>
    <div class="kpi"><div class="val">${slaPct}%</div><div class="lbl">SLA Adherence Rate</div></div>
  `;

  const distiCounts = countBy(rows, 'DISTI_norm');
  makeChart('chartDisti', 'pie', Object.keys(distiCounts), Object.values(distiCounts), PALETTE, { showCounts:true });

  makeChart('chartSla', 'doughnut',
    ['Within SLA','Out of SLA','Pending','N/A'],
    [within, outOfSla, pending, rows.filter(r=>r['SLA_calc']==='N/A').length],
    ['#3ecf8e','#ff6b6b','#ffb84d','#5b5f7a'],
    { showCounts:true }
  );

  const currentStatusCounts = countBy(rows, 'Current Status');
  makeChart('chartCurrentStatus', 'pie', Object.keys(currentStatusCounts), Object.values(currentStatusCounts), PALETTE, { showCounts:true });

  const rtmCounts = countBy(rows, 'RTM');
  makeChart('chartRtm', 'bar', Object.keys(rtmCounts), Object.values(rtmCounts), PALETTE);

  const tradeCounts = countBy(rows, 'Problem Area');
  makeChart('chartTrade', 'bar', Object.keys(tradeCounts), Object.values(tradeCounts), PALETTE);

  buildFilters();
  buildSummaryTable(rows);
}

function buildFilters(){
  const distiOptions = [...new Set(rawRows.map(r => r['DISTI_norm']))].sort();
  const currentStatusOptions = [...new Set(rawRows.map(r => r['Current Status']))].sort();
  const filtersDiv = document.getElementById('filters');
  filtersDiv.innerHTML = `
    <select id="distiFilter">
      <option value="">All DISTIs</option>
      ${distiOptions.map(d => `<option value="${d}" ${d===filterState.disti?'selected':''}>${d}</option>`).join('')}
    </select>
    <select id="currentStatusFilter">
      <option value="">All Current Status</option>
      ${currentStatusOptions.map(s => `<option value="${s}" ${s===filterState.currentStatus?'selected':''}>${s}</option>`).join('')}
    </select>
  `;
  document.getElementById('distiFilter').addEventListener('change', (e) => {
    filterState.disti = e.target.value;
    applyFiltersAndRender();
  });
  document.getElementById('currentStatusFilter').addEventListener('change', (e) => {
    filterState.currentStatus = e.target.value;
    applyFiltersAndRender();
  });
}

function buildSummaryTable(rows){
  const distis = [...new Set(rows.map(r => r['DISTI_norm']))].sort();
  const cols = ['Within SLA','Out of SLA','Pending','N/A'];
  let html = '<tr><th>DISTI</th>' + cols.map(c=>`<th>${c}</th>`).join('') + '<th>Total</th></tr>';
  distis.forEach(d => {
    const subset = rows.filter(r => r['DISTI_norm'] === d);
    const rowCounts = cols.map(c => subset.filter(r => r['SLA_calc'] === c).length);
    html += `<tr><td>${d}</td>${rowCounts.map(v=>`<td>${v}</td>`).join('')}<td><b>${subset.length}</b></td></tr>`;
  });
  document.getElementById('summaryTable').innerHTML = html;
}

function exportSummaryCsv(){
  const table = document.getElementById('summaryTable');
  let csv = [];
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('th,td')].map(td => td.textContent);
    csv.push(cells.join(','));
  });
  const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'disti_sla_summary.csv';
  a.click();
}
</script>
</body>
</html>
