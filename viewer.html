<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Partner Summary — ACS Maintenance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0f1220; --card:#171b2e; --accent:#5b8def; --text:#e8eaf2; --muted:#9aa3c0;
    --green:#3ecf8e; --red:#ff6b6b; --amber:#ffb84d;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header{
    padding:18px 28px; background:linear-gradient(135deg,#1c2140,#0f1220);
    border-bottom:1px solid #262b45; display:flex; align-items:center; justify-content:space-between;
  }
  header h1{ font-size:19px; margin:0; font-weight:600; }
  header p{ margin:3px 0 0; color:var(--muted); font-size:12.5px; }
  #logoutBtn{
    background:#2b3057; border:none; color:#fff; padding:8px 16px; border-radius:8px;
    font-size:13px; cursor:pointer;
  }
  #exportBtn{
    background:var(--green); border:none; color:#0f1220; padding:8px 16px; border-radius:8px;
    font-size:13px; cursor:pointer; font-weight:700; margin-right:10px; display:inline-flex;
    align-items:center; gap:6px;
  }
  #exportBtn:disabled{ opacity:.5; cursor:not-allowed; }
  .header-actions{ display:flex; align-items:center; }
  main{ padding:24px 28px; }
  #loadingMsg, #errorMsg{ color:var(--muted); font-size:14px; padding:40px; text-align:center; }
  #errorMsg{ color:var(--red); }

  .kpis{ display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
  .kpi{ background:var(--card); border-radius:12px; padding:14px 16px; border:1px solid #262b45; }
  .kpi .val{ font-size:22px; font-weight:700; }
  .kpi .lbl{ font-size:11px; color:var(--muted); margin-top:3px; }
  .kpi.green .val{ color:var(--green); }
  .kpi.red .val{ color:var(--red); }
  .kpi.amber .val{ color:var(--amber); }

  .filters{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .filters select{
    background:var(--card); color:var(--text); border:1px solid #2b3057; border-radius:8px;
    padding:7px 12px; font-size:12.5px;
  }

  .grid{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; margin-bottom:16px; }
  .card{ background:var(--card); border-radius:12px; padding:14px 16px; border:1px solid #262b45; }
  .card h3{ margin:0 0 10px; font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
  canvas{ max-height:250px; }

  #lastUpdated{ color:var(--muted); font-size:12px; margin-top:16px; text-align:right; }

  @media (max-width: 1100px){ .grid{ grid-template-columns:repeat(2,1fr); } .kpis{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width: 700px){ .grid{ grid-template-columns:1fr; } .kpis{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<header>
  <div>
    <h1 id="distiTitle">Loading your summary...</h1>
    <p>Read-only partner view — data published by ACS Maintenance</p>
  </div>
  <div class="header-actions">
    <button id="exportBtn" disabled>📊 Export My Data (.xlsx)</button>
    <button id="logoutBtn">Sign Out</button>
  </div>
</header>

<main>
  <div id="loadingMsg">Loading your data...</div>
  <div id="errorMsg" style="display:none;"></div>

  <div id="content" style="display:none;">
    <div class="filters" id="viewerFilters"></div>
    <div class="kpis" id="kpis"></div>
    <div class="grid">
      <div class="card"><h3>SLA Adherence</h3><canvas id="chartSla"></canvas></div>
      <div class="card"><h3>Current Status</h3><canvas id="chartCurrentStatus"></canvas></div>
      <div class="card"><h3>Trade / Problem Area</h3><canvas id="chartTrade"></canvas></div>
      <div class="card"><h3>Vendor-wise Tickets</h3><canvas id="chartVendor"></canvas></div>
      <div class="card"><h3>Quarter-wise Tickets</h3><canvas id="chartQtr"></canvas></div>
    </div>
    <div id="lastUpdated"></div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { initializeFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { firebaseConfig } from "./firebase-config.js";

  Chart.register(ChartDataLabels);

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false });

  const PALETTE = ['#5b8def','#3ecf8e','#ff6b6b','#ffb84d','#c792ea','#4ec9f0','#f0a500','#8bc34a','#e91e63','#607d8b'];

  let currentDisti = null;
  let currentData = null;
  let currentRawRows = null; // fetched lazily once filters are needed
  let viewerFilterState = { vendor: '', qtr: '' };

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = './login.html';
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = './login.html';
      return;
    }
    try {
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists() || !userSnap.data().disti) {
        showError('No DISTI assigned to this account. Contact admin.');
        return;
      }
      const disti = userSnap.data().disti;
      const summarySnap = await getDoc(doc(db, 'summaries', disti));
      if (!summarySnap.exists()) {
        showError('No published summary found yet for your account. Check back after the next update.');
        return;
      }
      renderSummary(disti, summarySnap.data());
    } catch (e) {
      showError('Could not load your data. You may not have access, or data has not been published yet.');
    }
  });

  function showError(msg) {
    document.getElementById('loadingMsg').style.display = 'none';
    const errDiv = document.getElementById('errorMsg');
    errDiv.style.display = 'block';
    errDiv.textContent = msg;
  }

  function renderSummary(disti, data) {
    currentDisti = disti;
    currentData = data;
    document.getElementById('exportBtn').disabled = false;

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('distiTitle').textContent = disti + ' — Service Summary';

    const k = data.kpis || {};
    document.getElementById('kpis').innerHTML = `
      <div class="kpi"><div class="val">${k.total ?? 0}</div><div class="lbl">Total Tickets</div></div>
      <div class="kpi green"><div class="val">${k.closed ?? 0}</div><div class="lbl">Closed</div></div>
      <div class="kpi green"><div class="val">${k.within ?? 0}</div><div class="lbl">Within SLA</div></div>
      <div class="kpi red"><div class="val">${k.outOfSla ?? 0}</div><div class="lbl">Out of SLA</div></div>
      <div class="kpi amber"><div class="val">${k.slaPct ?? 0}%</div><div class="lbl">SLA Adherence Rate</div></div>
    `;

    makeChart('chartSla', 'doughnut',
      ['Within SLA','Out of SLA','Pending','N/A'],
      [k.within ?? 0, k.outOfSla ?? 0, k.pending ?? 0, k.na ?? 0],
      ['#3ecf8e','#ff6b6b','#ffb84d','#5b5f7a']
    );

    const cs = data.currentStatusCounts || {};
    makeChart('chartCurrentStatus', 'pie', Object.keys(cs), Object.values(cs), PALETTE);

    const trade = data.tradeCounts || {};
    makeChart('chartTrade', 'bar', Object.keys(trade), Object.values(trade), PALETTE);

    const vendor = data.vendorCounts || {};
    makeChart('chartVendor', 'bar', Object.keys(vendor), Object.values(vendor), PALETTE);

    const qtr = data.qtrCounts || {};
    makeChart('chartQtr', 'bar', Object.keys(qtr), Object.values(qtr), PALETTE);

    if (data.publishedAt) {
      const d = new Date(data.publishedAt);
      document.getElementById('lastUpdated').textContent = 'Last updated: ' + d.toLocaleString();
    }

    loadFiltersAndEnable(disti);
  }

  async function loadFiltersAndEnable(docId){
    try {
      const chunksSnap = await getDocs(collection(db, 'summaries', docId, 'rawRows'));
      let rows = [];
      chunksSnap.forEach(chunkDoc => {
        const chunkData = chunkDoc.data();
        if (chunkData.rows) rows = rows.concat(chunkData.rows);
      });
      currentRawRows = rows;
      buildViewerFilters();
    } catch (e) {
      // If raw rows aren't available (e.g., older publish), filters simply won't appear.
      currentRawRows = null;
    }
  }

  function buildViewerFilters(){
    if (!currentRawRows || currentRawRows.length === 0) return;
    const vendorOptions = [...new Set(currentRawRows.map(r => r['Vendor']).filter(v => v !== undefined && v !== ''))].sort();
    const qtrOptions = [...new Set(currentRawRows.map(r => r['QTR']).filter(v => v !== undefined && v !== ''))].sort();

    const filtersDiv = document.getElementById('viewerFilters');
    filtersDiv.innerHTML = `
      <select id="vendorFilter">
        <option value="">All Vendors</option>
        ${vendorOptions.map(v => `<option value="${v}" ${v===viewerFilterState.vendor?'selected':''}>${v}</option>`).join('')}
      </select>
      <select id="qtrFilter">
        <option value="">All Quarters</option>
        ${qtrOptions.map(q => `<option value="${q}" ${q===viewerFilterState.qtr?'selected':''}>${q}</option>`).join('')}
      </select>
    `;
    document.getElementById('vendorFilter').addEventListener('change', e => { viewerFilterState.vendor = e.target.value; applyViewerFilters(); });
    document.getElementById('qtrFilter').addEventListener('change', e => { viewerFilterState.qtr = e.target.value; applyViewerFilters(); });
  }

  function applyViewerFilters(){
    if (!currentRawRows) return;
    let rows = currentRawRows;
    if (viewerFilterState.vendor) rows = rows.filter(r => r['Vendor'] === viewerFilterState.vendor);
    if (viewerFilterState.qtr) rows = rows.filter(r => r['QTR'] === viewerFilterState.qtr);

    const total = rows.length;
    const closed = rows.filter(r=>r['Status']==='Closed').length;
    const within = rows.filter(r=>r['SLA_calc']==='Within SLA').length;
    const out = rows.filter(r=>r['SLA_calc']==='Out of SLA').length;
    const pending = rows.filter(r=>r['SLA_calc']==='Pending').length;
    const na = rows.filter(r=>r['SLA_calc']==='N/A').length;
    const base = within+out;
    const slaPct = base ? Math.round((within/base)*100) : 0;

    document.getElementById('kpis').innerHTML = `
      <div class="kpi"><div class="val">${total}</div><div class="lbl">Total Tickets</div></div>
      <div class="kpi green"><div class="val">${closed}</div><div class="lbl">Closed</div></div>
      <div class="kpi green"><div class="val">${within}</div><div class="lbl">Within SLA</div></div>
      <div class="kpi red"><div class="val">${out}</div><div class="lbl">Out of SLA</div></div>
      <div class="kpi amber"><div class="val">${slaPct}%</div><div class="lbl">SLA Adherence Rate</div></div>
    `;

    makeChart('chartSla', 'doughnut', ['Within SLA','Out of SLA','Pending','N/A'], [within, out, pending, na], ['#3ecf8e','#ff6b6b','#ffb84d','#5b5f7a']);

    const csCounts = countByField(rows, 'Current Status');
    makeChart('chartCurrentStatus', 'pie', Object.keys(csCounts), Object.values(csCounts), PALETTE);

    const tradeCounts = countByField(rows, 'Problem Area');
    makeChart('chartTrade', 'bar', Object.keys(tradeCounts), Object.values(tradeCounts), PALETTE);

    const vendorCounts = countByField(rows, 'Vendor');
    makeChart('chartVendor', 'bar', Object.keys(vendorCounts), Object.values(vendorCounts), PALETTE);

    const qtrCounts = countByField(rows, 'QTR');
    makeChart('chartQtr', 'bar', Object.keys(qtrCounts), Object.values(qtrCounts), PALETTE);
  }

  function countByField(rows, key){
    const map = {};
    rows.forEach(r => { const v = (r[key]==='' || r[key]===undefined) ? 'Unknown' : r[key]; map[v] = (map[v]||0)+1; });
    return map;
  }

  function makeChart(id, type, labels, values, colors) {
    const isPieLike = type === 'pie' || type === 'doughnut';
    new Chart(document.getElementById(id), {
      type,
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: isPieLike?2:0, borderColor:'#171b2e' }] },
      options: {
        plugins: {
          legend: {
            position: type==='bar' ? 'none' : 'right',
            labels: {
              color:'#e8eaf2', font:{size:10.5},
              generateLabels: isPieLike ? (chart) => {
                const ds = chart.data.datasets[0];
                const total = ds.data.reduce((a,b)=>a+b,0);
                return chart.data.labels.map((label, i) => {
                  const value = ds.data[i];
                  const pct = total ? Math.round((value/total)*100) : 0;
                  return {
                    text: `${label}: ${value} (${pct}%)`,
                    fillStyle: ds.backgroundColor[i],
                    strokeStyle: ds.borderColor,
                    lineWidth: ds.borderWidth,
                    fontColor: '#e8eaf2',
                    color: '#e8eaf2',
                    index: i
                  };
                });
              } : undefined
            }
          },
          datalabels: { display:false }
        },
        scales: type==='bar' ? {
          x:{ ticks:{color:'#9aa3c0', font:{size:10}}, grid:{color:'#262b45'} },
          y:{ ticks:{color:'#9aa3c0'}, grid:{color:'#262b45'} }
        } : {}
      }
    });
  }

  document.getElementById('exportBtn').addEventListener('click', exportToExcel);

  async function exportToExcel() {
    if (!currentDisti || !currentData) return;
    const exportBtn = document.getElementById('exportBtn');
    const originalLabel = exportBtn.textContent;
    exportBtn.disabled = true;
    exportBtn.textContent = '⏳ Preparing file...';

    try {
      const k = currentData.kpis || {};
      const cs = currentData.currentStatusCounts || {};
      const trade = currentData.tradeCounts || {};
      const publishedAt = currentData.publishedAt ? new Date(currentData.publishedAt).toLocaleString() : 'N/A';

      const wb = XLSX.utils.book_new();

      // Sheet 1: KPI Summary
      const kpiRows = [
        ['DISTI', currentDisti],
        ['Last Updated', publishedAt],
        [],
        ['Metric', 'Value'],
        ['Total Tickets', k.total ?? 0],
        ['Closed Tickets', k.closed ?? 0],
        ['Within SLA', k.within ?? 0],
        ['Out of SLA', k.outOfSla ?? 0],
        ['Pending', k.pending ?? 0],
        ['N/A (no SLA target)', k.na ?? 0],
        ['SLA Adherence Rate (%)', k.slaPct ?? 0]
      ];
      const wsKpi = XLSX.utils.aoa_to_sheet(kpiRows);
      XLSX.utils.book_append_sheet(wb, wsKpi, 'KPI Summary');

      // Sheet 2: Current Status breakdown
      const statusRows = [['Current Status', 'Ticket Count']];
      Object.entries(cs).forEach(([status, count]) => statusRows.push([status, count]));
      const wsStatus = XLSX.utils.aoa_to_sheet(statusRows);
      XLSX.utils.book_append_sheet(wb, wsStatus, 'Current Status');

      // Sheet 3: Trade / Problem Area breakdown
      const tradeRows = [['Trade / Problem Area', 'Ticket Count']];
      Object.entries(trade).forEach(([area, count]) => tradeRows.push([area, count]));
      const wsTrade = XLSX.utils.aoa_to_sheet(tradeRows);
      XLSX.utils.book_append_sheet(wb, wsTrade, 'Trade Breakdown');

      // Sheet 4: Full row-level ticket data (exact upload columns + system-added columns)
      const docId = currentDisti;
      const chunksSnap = await getDocs(collection(db, 'summaries', docId, 'rawRows'));
      let allRows = [];
      chunksSnap.forEach(chunkDoc => {
        const chunkData = chunkDoc.data();
        if (chunkData.rows) allRows = allRows.concat(chunkData.rows);
      });

      if (allRows.length > 0) {
        const colOrder = (currentData.columnOrder && currentData.columnOrder.length > 0)
          ? currentData.columnOrder
          : Object.keys(allRows[0]); // fallback if older publish has no saved order

        const wsRaw = XLSX.utils.json_to_sheet(allRows, { header: colOrder });
        XLSX.utils.book_append_sheet(wb, wsRaw, 'Full Ticket Data');
      } else {
        const wsRawEmpty = XLSX.utils.aoa_to_sheet([['No row-level data available for this publish. Ask admin to re-publish.']]);
        XLSX.utils.book_append_sheet(wb, wsRawEmpty, 'Full Ticket Data');
      }

      const dateStr = new Date().toISOString().slice(0,10);
      const fileName = `${currentDisti}_full_data_${dateStr}.xlsx`;
      XLSX.writeFile(wb, fileName);
    } catch (e) {
      alert('Export failed: ' + e.message);
    }

    exportBtn.disabled = false;
    exportBtn.textContent = originalLabel;
  }
</script>
</body>
</html>
